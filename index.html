<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Maafaru International – 07 March 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #d9e4ec;
            min-height: 100vh;
            padding: 16px 12px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        /* Header Card */
        .header-card {
            background: white;
            border-radius: 28px;
            padding: 22px 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 40, 60, 0.12);
            border: 1px solid rgba(255,255,255,0.7);
        }

        .airport-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #003546;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }

        .badge {
            background: #1f5f73;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 5px 16px;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }

        .badge.orange {
            background: #c97d4b;
        }

        .live-indicator {
            background: #1b5f77;
            color: white;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #7eff7e;
            border-radius: 50%;
            animation: blink 1.5s infinite;
            box-shadow: 0 0 8px #7eff7e;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .location {
            color: #1e4f60;
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .location-icon::before {
            content: "📍";
            margin-right: 4px;
        }

        .location-code {
            background: #d0e6f2;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        /* Movement List */
        .movement-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 20px 0;
        }

        .movement-card {
            background: white;
            border-radius: 26px;
            padding: 18px 16px;
            border: 1px solid #c7dde9;
            box-shadow: 0 5px 15px rgba(0, 40, 55, 0.06);
            transition: all 0.2s;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .reg {
            font-size: 1.6rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            color: #003546;
        }

        .time-badge {
            background: #e2edf5;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            color: #0b4d63;
            border: 1px solid #b9d3e4;
        }

        .details-grid {
            background: #f3f9fd;
            border-radius: 22px;
            padding: 16px 14px;
            margin: 12px 0 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-start;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #54778b;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .detail-value {
            font-weight: 600;
            color: #113845;
            font-size: 1rem;
        }

        .pax-chip {
            background: #d9eaf3;
            padding: 4px 14px;
            border-radius: 30px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
        }

        .crt-chip {
            background: #fdefcb;
            border: 1px solid #f5c84e;
            color: #735f1a;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 600;
        }

        .status-chip {
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .status-soon {
            background: #ffa500;
            color: white;
            animation: pulse 1.5s infinite;
        }
        .status-landed {
            background: #28a745;
            color: white;
        }
        .status-ongoing {
            background: #17a2b8;
            color: white;
            animation: pulse 1.5s infinite;
        }
        .status-departed {
            background: #6c757d;
            color: white;
        }
        .status-default {
            background: #e9ecef;
            color: #495057;
        }

        @keyframes pulse {
            0% { opacity: 0.9; }
            50% { opacity: 0.6; }
            100% { opacity: 0.9; }
        }

        .route {
            font-size: 0.95rem;
            color: #1c5b72;
            background: white;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px dashed #99bfd2;
            display: inline-block;
            width: auto;
        }

        /* Summary Card */
        .summary-card {
            background: #f0f7fc;
            border-radius: 26px;
            padding: 22px 20px;
            margin: 24px 0 18px;
            border: 1px solid #b7d1e0;
        }

        .summary-title {
            font-weight: 700;
            color: #124c5e;
            font-size: 1.2rem;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .stat-bubble {
            background: white;
            border-radius: 50px;
            padding: 10px 24px;
            border: 1px solid #aac9dd;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            font-weight: 600;
        }

        .stat-number {
            font-weight: 800;
            font-size: 1.4rem;
            color: #003f54;
            margin-right: 5px;
        }

        .parking-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 12px 0 5px;
        }

        .parking-tag {
            background: white;
            border-radius: 40px;
            padding: 6px 20px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            border: 1px solid #92b9cf;
            font-size: 0.9rem;
        }

        .special-card {
            background: white;
            border-radius: 26px;
            padding: 22px 20px;
            margin: 18px 0;
            border-left: 6px solid #1f8aae;
            box-shadow: 0 8px 18px rgba(0, 45, 60, 0.06);
        }

        .special-title {
            font-weight: 700;
            color: #016985;
            font-size: 1.1rem;
            margin-bottom: 16px;
        }

        .special-items {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .special-item {
            background: #e4f0f7;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #05485f;
            border: 1px solid #b7d6ea;
            flex: 1 0 auto;
        }

        .special-item strong {
            font-weight: 800;
        }

        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: #6f96a8;
            margin: 24px 0 12px;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            justify-content: center;
            margin: 16px 0 8px;
            font-size: 0.8rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 20px;
        }
        .legend-soon { background: #ffa500; }
        .legend-landed { background: #28a745; }
        .legend-ongoing { background: #17a2b8; }
        .legend-departed { background: #6c757d; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Header Card -->
        <div class="header-card">
            <div class="airport-name">Maafaru International</div>
            <div class="badge-row">
                <span class="badge">07 MAR 2026</span>
                <span class="badge orange">SATURDAY</span>
                <span class="live-indicator">
                    <span class="live-dot"></span> LIVE
                </span>
            </div>
            <div class="location">
                <span class="location-icon"></span> VRDA – Maafaru, Maldives
                <span class="location-code">🇲🇻</span>
            </div>
        </div>

        <!-- Movement Cards Container -->
        <div class="movement-list" id="movementList"></div>

        <!-- Summary Card -->
        <div class="summary-card">
            <div class="summary-title">📊 Quick Summary</div>
            <div class="stats-row" id="summaryStats"></div>
            <div style="font-weight: 600; color: #134b5e;">🛑 Overnight parking</div>
            <div class="parking-tags" id="parkingTags"></div>
        </div>

        <!-- Special Instructions Card -->
        <div class="special-card">
            <div class="special-title">✈️ Special Instructions</div>
            <div class="special-items" id="specialItems"></div>
        </div>

        <!-- Legend & Footer -->
        <div class="legend">
            <div class="legend-item"><span class="legend-color legend-soon"></span> SOON (30min)</div>
            <div class="legend-item"><span class="legend-color legend-landed"></span> LANDED</div>
            <div class="legend-item"><span class="legend-color legend-ongoing"></span> ONGOING</div>
            <div class="legend-item"><span class="legend-color legend-departed"></span> FINISHED</div>
        </div>
        <div class="footer">
            Maafaru International Airport (VRDA) · 07 March 2026 · Auto-refreshes every minute
        </div>
    </div>

    <script>
        (function() {
            // ==================== MOVEMENTS DATA ====================
            const movements = [
                { reg: "RA73558", operator: "AVIA", arr: "08:45", dep: "", route: "UZSS – VRDA", pax: "13/00", crt: "" },
                { reg: "TCALG", operator: "AVIA", arr: "", dep: "10:15", route: "UUWW – VRDA – OMAD", pax: "00/00", crt: "08:30" },
                { reg: "CNGMT", operator: "AVIA", arr: "", dep: "11:00", route: "HELX – VRDA – HELX", pax: "00/03", crt: "08:30" },
                { reg: "UPEM025", operator: "AVIA", arr: "", dep: "10:30", route: "UAAA – VRDA – OOMS", pax: "00/00", crt: "09:00" },
                { reg: "OK-SIX", operator: "FSM", arr: "", dep: "", route: "Crew Aircraft Visit", pax: "—", crt: "09:30" },
                { reg: "UPEM016", operator: "AVIA", arr: "", dep: "12:00", route: "UZTT – VRDA – UZTP", pax: "00/08", crt: "09:50" },
                { reg: "DAIRI", operator: "AVIA", arr: "10:05", dep: "", route: "EBBR – VRDA", pax: "08/00", crt: "" },
                { reg: "UPEM022", operator: "AVIA", arr: "", dep: "13:00", route: "UAAA – VRDA – UAAA", pax: "00/02", crt: "10:30" },
                { reg: "VPCYW", operator: "AVIA", arr: "13:20", dep: "", route: "ZSSS – VRDA", pax: "07/00", crt: "" },
                { reg: "TCTSS", operator: "AVIA", arr: "", dep: "14:30", route: "LIMJ – VRDA – VRMM", pax: "00/00", crt: "13:00" }
            ];

            const overnightParking = ["RA73558", "DAIRI", "VPCYW"];

            const specialInstructions = [
                "<strong>TCALG:</strong> AVIA Fuel / NOKU 08:30",
                "<strong>UPEM025:</strong> JETEX / FINI PALACE 09:00",
                "<strong>CNGMT:</strong> JETEX / SUNSIYAM 09:00 / NOKU 08:30",
                "<strong>UPEM016:</strong> JETEX / VELAA 10:00 / FINI PALACE 09:50",
                "<strong>UPEM022:</strong> JETEX / NOKU 10:30",
                "<strong>TCTSS:</strong> UCIG / NOKU 13:00",
                "<strong>OK-SIX:</strong> Aircraft visit / CRT 09:30"
            ];

            // ==================== UTILITIES ====================
            function timeToMinutes(t) {
                if (!t) return null;
                const parts = t.split(':');
                return parseInt(parts[0]) * 60 + parseInt(parts[1]);
            }

            function getMaldivesTime() {
                const now = new Date();
                const utc = now.getUTCHours() * 60 + now.getUTCMinutes();
                let mld = utc + 5 * 60;
                if (mld >= 1440) mld -= 1440;
                return mld;
            }

            function getStatus(reg, arr, dep, crt) {
                const now = getMaldivesTime();
                const arrMin = arr ? timeToMinutes(arr) : null;
                const depMin = dep ? timeToMinutes(dep) : null;
                const crtMin = crt ? timeToMinutes(crt) : null;

                // Arrival only
                if (arrMin && !depMin) {
                    if (now < arrMin && arrMin - now <= 30) return { text: "SOON", class: "status-soon" };
                    if (now >= arrMin && now < arrMin + 180) return { text: "LANDED", class: "status-landed" };
                    if (now >= arrMin + 180) return { text: "FINISHED", class: "status-departed" };
                }

                // Departure with CRT
                if (depMin && crtMin) {
                    if (now < crtMin && crtMin - now <= 30) return { text: "SOON", class: "status-soon" };
                    if (now >= crtMin && now < depMin) return { text: "ONGOING", class: "status-ongoing" };
                    if (now >= depMin) return { text: "DEPARTED", class: "status-departed" };
                }

                // Departure without CRT
                if (depMin && !crtMin) {
                    if (now < depMin && depMin - now <= 30) return { text: "SOON", class: "status-soon" };
                    if (now >= depMin) return { text: "DEPARTED", class: "status-departed" };
                }

                // CRT only (OK-SIX)
                if (!arrMin && !depMin && crtMin) {
                    if (now < crtMin && crtMin - now <= 30) return { text: "SOON", class: "status-soon" };
                    if (now >= crtMin && now < crtMin + 180) return { text: "ONGOING", class: "status-ongoing" };
                    if (now >= crtMin + 180) return { text: "FINISHED", class: "status-departed" };
                }

                return { text: "—", class: "status-default" };
            }

            // ==================== RENDER ====================
            function render() {
                const movementList = document.getElementById('movementList');
                const summaryStats = document.getElementById('summaryStats');
                const parkingTags = document.getElementById('parkingTags');
                const specialItems = document.getElementById('specialItems');

                // Sort movements by earliest time
                const sorted = [...movements].sort((a, b) => {
                    const ta = a.arr || a.dep || a.crt || "00:00";
                    const tb = b.arr || b.dep || b.crt || "00:00";
                    return timeToMinutes(ta) - timeToMinutes(tb);
                });

                let arrivals = 0, departures = 0;
                let cardsHtml = '';

                sorted.forEach(m => {
                    if (m.arr && !m.dep) arrivals++;
                    else if (!m.arr && m.dep) departures++;
                    else if (m.arr && m.dep) { arrivals++; departures++; }

                    const status = getStatus(m.reg, m.arr, m.dep, m.crt);
                    const displayTime = m.arr || m.dep || '—';

                    cardsHtml += `
                        <div class="movement-card">
                            <div class="card-header">
                                <span class="reg">${m.reg}</span>
                                <span class="time-badge">${displayTime}</span>
                            </div>
                            <div class="details-grid">
                                <div class="detail-item">
                                    <span class="detail-label">Operator</span>
                                    <span class="detail-value">${m.operator}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">PAX</span>
                                    <span class="detail-value pax-chip">${m.pax}</span>
                                </div>
                                ${m.crt ? `
                                <div class="detail-item">
                                    <span class="detail-label">CRT</span>
                                    <span class="detail-value crt-chip">${m.crt} LT</span>
                                </div>
                                ` : ''}
                                <div class="detail-item">
                                    <span class="detail-label">Status</span>
                                    <span class="detail-value status-chip ${status.class}">${status.text}</span>
                                </div>
                            </div>
                            <div class="route">${m.route}</div>
                        </div>
                    `;
                });

                movementList.innerHTML = cardsHtml;
                summaryStats.innerHTML = `
                    <div class="stat-bubble"><span class="stat-number">${arrivals}</span> arrivals</div>
                    <div class="stat-bubble"><span class="stat-number">${departures}</span> departures</div>
                `;

                parkingTags.innerHTML = overnightParking.map(t => `<span class="parking-tag">${t}</span>`).join('');
                specialItems.innerHTML = specialInstructions.map(s => `<span class="special-item">${s}</span>`).join('');
            }

            // Initial render
            render();

            // Auto-refresh every 60 seconds
            setInterval(render, 60000);
        })();
    </script>
</body>
</html>
